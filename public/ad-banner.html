<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Advertisement Banner</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: transparent;
      overflow: hidden;
      width: 100%;
      height: 50px;
    }
    /* Scale down the 300x250 ad to fit if necessary, though it's better to use a proper 320x50 zone ID */
    ins {
      transform-origin: center center;
    }
  </style>
</head>
<body>
  <!-- JuicyAds v3.0 -->
  <script type="text/javascript" data-cfasync="false" async src="https://poweredby.jads.co/js/jads.js"></script>
  <!-- Using the same zone ID but requesting 320x50. Note: You may need a specific zone ID for 320x50 banners from JuicyAds -->
  <ins id="1113423" data-width="320" data-height="50"></ins>
  <script type="text/javascript" data-cfasync="false" async>(adsbyjuicy = window.adsbyjuicy || []).push({'adzone':1113423});</script>
  <!--JuicyAds END-->
</body>
</html>
